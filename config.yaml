project:
  name: riverside-tax-refund-v3
  description: Riverside County Tax Refund Lookup

aws:
  region: us-west-2

lambda:
  function_name: riverside-tax-lookup-v3
  timeout_seconds: 30
  memory_mb: 512
  environment:
    PROPERTY_TAX_URL: https://apps.auditorcontroller.org/unclaimedrefund/refundform.aspx
    AP13_PDF_URL: "https://auditorcontroller.org/sites/g/files/aldnop171/files/2024-10/AP13AffidavitfortheReplaceofStlDtdWarr%2010_30_24.pdf"
    FUZZY_THRESHOLD: "0.8"

s3:
  bucket_suffix: data
  data_file: refunds_demo_balanced.jsonl

retention:
  hot_days: 90
  warm_days: 365
  cold_days: 1825
  expire_days: 2555

# Super-admin bootstrap. Created by CDK custom resource on first deploy.
# Additional super-admins and all other admin users/departments are managed
# at runtime from the dashboard.
# REQUIRED: set to an email you control before running `cdk deploy`. The CDK
# stack creates a Cognito user with this email and a temporary password (see
# `SuperAdminBootstrapPassword` in stack outputs).
super_admin:
  email: gflusser+super@amazon.com

notifications:
  mode: ses         # "ses" (real email) or "log" (CloudWatch only)
  # REQUIRED if mode is "ses". This is the "From" address on notification
  # emails. CDK creates an SES identity; you must click the verification
  # link AWS sends before notifications can actually deliver.
  sender: gflusser+super@amazon.com

# Admin dashboard (Next.js) build config. CodeBuild pulls from this repo/branch.
admin_dashboard:
  github_owner: cal-poly-dxhub
  github_repo: rivco-tax-connect
  github_branch: feat/dynamic-departments

# Bedrock Claude — drives the web chat agent.
bedrock:
  # Inference profile ID (cross-region) for the chat model.
  model_id: us.anthropic.claude-haiku-4-5-20251001-v1:0

# The chat agent's system prompt lives in `cdk/chat_system_prompt.md` and is
# loaded by the CDK stack on each deploy. Edit that file (or the SSM parameter
# `/<project>/chat/system-prompt` for live changes that survive only until the
# next deploy).
