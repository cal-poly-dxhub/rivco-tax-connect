<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Riverside County — Submission Package</title>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700&family=Lato:wght@400;700&display=swap" rel="stylesheet" />
        <style>
            :root { --navy:#002f87; --blue:#0c71ca; --bg:#f4f6f9; --surface:#fff; --border:#d6dce2; --text:#1a1a2e; --text-muted:#556575; --green:#2e7d32; --red:#c61f1f; --radius:8px; }
            * { box-sizing:border-box; margin:0; padding:0; }
            body { font-family:"Lato",sans-serif; background:var(--bg); color:var(--text); min-height:100vh; font-size:15px; line-height:1.6; }
            .site-header { background:#fff; box-shadow:0 4px 8px rgba(0,0,0,.05); }
            .header-main { display:flex; align-items:center; padding:.5rem 2rem; min-height:3.75rem; }
            .header-main img.logo { max-height:3.75rem; width:auto; }
            .header-page-title { margin-left:2rem; padding-left:2rem; border-left:1px solid var(--border); font-family:"Montserrat",sans-serif; font-size:.875rem; font-weight:600; color:var(--navy); line-height:1.3; }
            .header-page-title span { display:block; font-weight:400; font-size:.75rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:.05em; }
            .container { max-width:700px; margin:2rem auto; padding:0 1.25rem 4rem; }
            .card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:2rem; box-shadow:0 1px 4px rgba(0,0,0,.06); }
            h1 { font-family:"Montserrat",sans-serif; font-size:1.1rem; font-weight:700; color:var(--navy); margin-bottom:.25rem; }
            .meta { font-size:.85rem; color:var(--text-muted); margin-bottom:1.5rem; }
            .file-list { list-style:none; }
            .file-list li { display:flex; align-items:center; justify-content:space-between; padding:.7rem 0; border-bottom:1px solid var(--border); }
            .file-list li:last-child { border-bottom:none; }
            .file-name { font-size:.9rem; }
            .file-size { font-size:.8rem; color:var(--text-muted); margin-left:auto; margin-right:1rem; }
            .dl-btn { padding:.35rem .9rem; background:var(--navy); color:#fff; border:none; border-radius:4px; font-size:.8rem; font-family:"Montserrat",sans-serif; font-weight:600; cursor:pointer; text-decoration:none; white-space:nowrap; }
            .dl-btn:hover { background:var(--blue); }
            .dl-all { display:inline-block; margin-top:1.25rem; padding:.6rem 1.2rem; background:var(--navy); color:#fff; border:none; border-radius:4px; font-size:.85rem; font-family:"Montserrat",sans-serif; font-weight:600; cursor:pointer; text-decoration:none; }
            .dl-all:hover { background:var(--blue); }
            .back { display:inline-block; margin-top:1rem; font-size:.85rem; color:var(--blue); text-decoration:none; }
            .back:hover { text-decoration:underline; }
            .error { color:var(--red); padding:2rem; text-align:center; }
            .loading { color:var(--blue); padding:2rem; text-align:center; }
        </style>
    </head>
    <body>
        <div class="site-header">
            <div class="header-main">
                <img src="images/ACO_Logo_Small.png" alt="Auditor Controller County of Riverside" class="logo" />
                <div class="header-page-title">Submission Package<span>Auditor-Controller · County of Riverside</span></div>
            </div>
        </div>
        <div class="container">
            <div class="card" id="content">
                <div class="loading">Loading package…</div>
            </div>
            <a href="admin.html" class="back">← Back to dashboard</a>
        </div>
        <script src="config.js"></script>
        <script>
        (function () {
            var API_URL = window.API_URL || "";
            var id = new URLSearchParams(window.location.search).get("id");
            var el = document.getElementById("content");

            if (!id) { el.innerHTML = '<div class="error">No submission ID provided.</div>'; return; }

            function fmtSize(b) {
                if (b < 1024) return b + " B";
                if (b < 1048576) return (b / 1024).toFixed(1) + " KB";
                return (b / 1048576).toFixed(1) + " MB";
            }

            fetch(API_URL + "/package?id=" + encodeURIComponent(id))
                .then(function (r) { return r.json(); })
                .then(function (pkg) {
                    if (pkg.error) { el.innerHTML = '<div class="error">' + pkg.error + '</div>'; return; }
                    var html = '<h1>' + (pkg.name || "Unknown") + '</h1>'
                        + '<div class="meta">ID: ' + pkg.submissionId + ' · Type: ' + pkg.refundType.replace(/_/g, " ").replace(/\b\w/g, function(c){return c.toUpperCase();}) + '</div>'
                        + '<ul class="file-list">';
                    pkg.files.forEach(function (f) {
                        html += '<li><span class="file-name">📄 ' + f.filename + '</span>'
                            + '<span class="file-size">' + fmtSize(f.size) + '</span>'
                            + '<a class="dl-btn" href="' + f.downloadUrl + '" download="' + f.filename + '">Download</a></li>';
                    });
                    html += '</ul>';
                    if (pkg.files.length > 1) {
                        html += '<button class="dl-all" id="dlAll">Download All</button>';
                    }
                    el.innerHTML = html;

                    var dlAll = document.getElementById("dlAll");
                    if (dlAll) {
                        dlAll.addEventListener("click", function () {
                            pkg.files.forEach(function (f) {
                                var a = document.createElement("a");
                                a.href = f.downloadUrl;
                                a.download = f.filename;
                                document.body.appendChild(a);
                                a.click();
                                document.body.removeChild(a);
                            });
                        });
                    }
                })
                .catch(function (err) {
                    el.innerHTML = '<div class="error">Failed to load: ' + err.message + '</div>';
                });
        })();
        </script>
    </body>
</html>
